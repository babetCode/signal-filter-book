title: Signal Filter Book
description: A static site built from marimo notebooks + Markdown.
authors:
  - name: Adrien Babet

# Uncomment + fill in to enable repo-aware launch buttons (molab / GitHub /
# Download) on every .py page. The branch is where molab will resolve
# against; if you're working on a feature branch, change it here.
# repo: https://github.com/your-org/your-repo
# branch: main
repo: https://github.com/babetCode/signal-filter-book
branch: main

logo: images/filter-book-icon.svg
favicon: images/filter-book-icon.svg

# Material for MkDocs palette. Any hex color works; uncomment to customise.
# theme:
#   palette:
#     primary: "#1976D2"
#     accent:  "#FF9800"

# Per-chapter launch buttons. molab / download apply to .py only; github
# applies to both .md and .py. Set any of these to false to hide them.
launch_buttons:
  molab: true
  github: true
  download: true

# How notebook dependencies get provisioned at build time.
#   env     — reuse the Python environment that runs `marimo-book`. You
#             manage deps via pyproject.toml / requirements.txt in this
#             repo. Fastest; good for books where all notebooks share a
#             stack (e.g. numpy + pandas + your domain package).
#   sandbox — pass --sandbox to marimo, which provisions an isolated uv
#             env per notebook from each .py's PEP 723 header. Slower
#             (~5-10s first run per notebook, cached after) but
#             reproducible; notebooks are portable anywhere uv is
#             installed. Override per-invocation with `build --sandbox`.
dependencies:
  mode: env

# Anywidget defaults. Keyed by widget class name; merged with literal
# kwargs parsed from each notebook cell. Fill in when your widgets need
# initial state for their JS to render on first paint.
# widget_defaults:
#   MyWidget:
#     some_param: 42

toc:
  - file: content/home.md
  - file: content/introduction.py
    title: "Introduction"
  - file: content/01_g_h_filter.py
    title: "Chapter 1: g-h filter"
  - section: utils
    children:
      - file: content/utils/static_example.py
      - file: content/utils/cached_example.py
        mode: cached
      - file: content/utils/wasm_example.py
        mode: wasm
      - file: content/utils/wasm_editor.py
        title: "Wasm editor"
        mode: wasm
      
